<!DOCTYPE html>
<html>
<head>
    <title>{% if room %}Редактирование комнаты{% else %}Новая комната{% endif %}</title>
</head>
<body>
    <h1>{% if room %}Редактирование комнаты{% else %}Новая комната{% endif %}</h1>
    <p>Здание: {{ building.city }}, {{ building.street }}</p>
    {% from 'flash_macro.html' import show_flashes %} {{ show_flashes() }}

    <form method="post">
        <label>
            <input type="checkbox" name="is_available" {% if room and room.is_available_for_booking %}checked{% endif %}>
            Доступна для бронирования
        </label><br><br>

        <label>Площадь: <input type="number" step="any" name="size" value="{{ room.size if room else '' }}"></label><br><br>

        <label>Вместимость: <input type="number" name="capacity" value="{{ room.capacity if room else '' }}" required></label><br><br>

        <button type="submit">Сохранить</button>
        <a href="{{ url_for('room.browse', building_id=building.id) }}">Отмена</a>
    </form>
</body>
</html>
