<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if room %}Редактирование комнаты{% else %}Новая комната{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{% if room %}Редактирование комнаты{% else %}Новая комната{% endif %}</h1>
    {% from 'flash_macro.html' import show_flashes %}
    {{ show_flashes() }}

    <div class="generic-form" style="margin-bottom: 1rem;">
        <p style="margin-bottom: 0; color: #475569;">
            <strong>Здание:</strong> {{ building.city }}, {{ building.street }}
        </p>
    </div>

    <form method="post" class="generic-form">
        <div class="form-group">
            <label class="checkbox-label" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" name="is_available" {% if room and room.is_available_for_booking %}checked{% endif %}>
                <span>Доступна для бронирования</span>
            </label>
        </div>

        <div class="form-group">
            <label for="size">Площадь:</label>
            <input type="number" step="any" id="size" name="size" value="{{ room.size if room else '' }}" placeholder="например, 25.5">
        </div>

        <div class="form-group">
            <label for="capacity">Вместимость:</label>
            <input type="number" id="capacity" name="capacity" value="{{ room.capacity if room else '' }}" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="submit-btn">Сохранить</button>
            <a href="{{ url_for('room.browse', building_id=building.id) }}" class="cancel-link">Отмена</a>
        </div>
    </form>
</body>
</html>
