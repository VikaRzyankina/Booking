{% extends 'layout.html' %}
{% block title %}Личный кабинет{% endblock %}
{% block body %}
    <h1>Добро пожаловать, {{ full_name }}!</h1>
    {% from 'flash_macro.html' import show_flashes %}
    {{ show_flashes() }}

    <div class="nav-links">
        <a href="{{ url_for('booking.my_bookings') }}" class="add-link">Мои бронирования</a>
        <a href="{{ url_for('building.browse') }}" class="add-link">Места бронирования</a>
        <a href="{{ url_for('booking.browse') }}" class="add-link">Менеджмент</a>
        <a href="{{ url_for('user.settings') }}" class="add-link">Настройки</a>
        <form action="{{ url_for('user.logout') }}" method="post" class="inline-form">
            <button type="submit" class="delete-btn">Выйти</button>
        </form>
    </div>

    <div class="generic-form">
        <div class="form-group">
            <strong>Телефон:</strong> {{ phone }}
        </div>
    </div>
{% endblock %}
