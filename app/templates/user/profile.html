<!DOCTYPE html>
<html>
<head>
    <title>Личный кабинет</title>
</head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li style="color: green;">{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <h1>Добро пожаловать, {{ full_name }}!</h1>
    <p><strong>Телефон:</strong> {{ phone }}</p>
    <p><a href="{{ url_for('building.browse') }}">Места бронирования</a></p>
    <p><a href="{{ url_for('user.settings') }}">Настройки</a></p>
    <p><a href="{{ url_for('user.logout') }}">Выйти</a></p>
</body>
</html>
