<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
</head>
<body>
    <h1>Вход</h1>
    {% from 'flash_macro.html' import show_flashes %} {{ show_flashes() }}

    <form method="post">
        <label>Логин:</label><br>
        <input type="text" name="login" required><br><br>
        <label>Пароль:</label><br>
        <input type="password" name="password" required><br><br>
        <input type="submit" value="Войти">
    </form>
    <p>Нет аккаунта? <a href="{{ url_for('user.register') }}">Зарегистрироваться</a></p>
</body>
</html>
