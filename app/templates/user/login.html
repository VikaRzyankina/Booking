{% extends 'layout.html' %}
{% block title %}Вход{% endblock %}
{% block body %}
    <h1>Вход</h1>
    {% from 'flash_macro.html' import show_flashes %}
    {{ show_flashes() }}

    <form method="post" class="generic-form">
        <div class="form-group">
            <label for="login">Логин:</label>
            <input type="text" id="login" name="login" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="submit-btn">Войти</button>
            <a href="{{ url_for('user.register') }}" class="cancel-link">Регистрация</a>
        </div>
    </form>

    <p class="centered-note">
        Нет аккаунта? <a href="{{ url_for('user.register') }}" class="back-link">Зарегистрироваться</a>
    </p>
{% endblock %}
