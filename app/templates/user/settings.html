{% extends 'layout.html' %}
{% block title %}Настройки профиля{% endblock %}
{% block body %}
    <h1>Настройки профиля</h1>

    <form method="POST" class="generic-form">
        <div class="settings-cols">
            <div class="settings-col">
                <h2>Смена пароля</h2>
                <div class="form-group">
                    <label for="current_password">Текущий пароль:</label>
                    <input type="password" id="current_password" name="current_password">
                </div>
                <div class="form-group">
                    <label for="new_password">Новый пароль:</label>
                    <input type="password" id="new_password" name="new_password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Подтверждение нового пароля:</label>
                    <input type="password" id="confirm_password" name="confirm_password">
                </div>
            </div>

            <div class="settings-col">
                <h2>Изменение личных данных</h2>
                <div class="form-group">
                    <label for="full_name">Полное имя:</label>
                    <input type="text" id="full_name" name="full_name" value="{{ full_name }}" required>
                </div>
                <div class="form-group">
                    <label for="phone">Телефон:</label>
                    <input type="text" id="phone" name="phone" value="{{ phone }}" required>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="submit-btn">Сохранить изменения</button>
            <a href="{{ url_for('building.browse') }}" class="cancel-link">Отмена</a>
        </div>
    </form>
{% endblock %}
