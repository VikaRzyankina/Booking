{% extends 'layout.html' %}
{% block title %}Регистрация{% endblock %}
{% block body %}
    <h1>Регистрация</h1>
    {% from 'flash_macro.html' import show_flashes %}
    {{ show_flashes() }}

    <form method="post" class="generic-form">
        <div class="form-group">
            <label for="login">Логин:</label>
            <input type="text" id="login" name="login" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="full_name">ФИО:</label>
            <input type="text" id="full_name" name="full_name" required>
        </div>
        <div class="form-group">
            <label for="phone">Телефон:</label>
            <input type="text" id="phone" name="phone" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
            <a href="{{ url_for('user.login') }}" class="cancel-link">Вход</a>
        </div>
    </form>

    <p class="centered-note">
        Уже есть аккаунт? <a href="{{ url_for('user.login') }}" class="back-link">Войти</a>
    </p>
{% endblock %}
