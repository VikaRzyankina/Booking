<!DOCTYPE html>
<html>
<head>
    <title>Здания</title>
</head>
<body>
    <h1>Список зданий</h1>
    {% from 'flash_macro.html' import show_flashes %} {{ show_flashes() }}

    <a href="{{ url_for('building.new_building') }}">Добавить здание</a>
    <table border="1">
        <thead>
            <tr>
                <th>Город</th>
                <th>Улица</th>
                <th>Описание</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for building in buildings %}
            <tr>
                <td>{{ building.city }}</td>
                <td>{{ building.street }}</td>
                <td>{{ building.description or '' }}</td>
                <td>
                    <a href="{{ url_for('building.edit_building', id=building.id) }}">Редактировать</a>
                    <form action="{{ url_for('building.delete_building', id=building.id) }}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('Удалить здание?')">Удалить</button>
                    </form>
                    <a href="{{ url_for('room.browse', building_id=building.id) }}">Комнаты</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
