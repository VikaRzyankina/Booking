<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if building %}Редактирование{% else %}Новое здание{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{% if building %}Редактирование здания{% else %}Добавление здания{% endif %}</h1>
    {% from 'flash_macro.html' import show_flashes %}
    {{ show_flashes() }}

    <form method="post" class="generic-form">
        <div class="form-group">
            <label for="city">Город:</label>
            <input type="text" id="city" name="city" value="{{ building.city if building else '' }}" required>
        </div>
        <div class="form-group">
            <label for="street">Улица:</label>
            <input type="text" id="street" name="street" value="{{ building.street if building else '' }}" required>
        </div>
        <div class="form-group">
            <label for="description">Описание:</label>
            <textarea id="description" name="description" rows="3">{% if building %}{{ building.description or '' }}{% endif %}</textarea>
        </div>

        <h2>Часы работы</h2>
        <table class="hours-table">
            <thead>
                <tr>
                    <th>День недели</th>
                    <th>Открыто с</th>
                    <th>До</th>
                    <th>Выходной</th>
                </tr>
            </thead>
            <tbody>
                {% for day in days %}
                {% set wh = working_hours.get(day, {}) %}
                <tr>
                    <td>{{ day }}</td>
                    <td>
                        <input type="time" name="{{ day }}_open_time" class="time-input"
                               value="{{ wh.open_time if wh and not wh.is_closed else '' }}"
                               {% if wh and wh.is_closed %}disabled{% endif %}>
                    </td>
                    <td>
                        <input type="time" name="{{ day }}_close_time" class="time-input"
                               value="{{ wh.close_time if wh and not wh.is_closed else '' }}"
                               {% if wh and wh.is_closed %}disabled{% endif %}>
                    </td>
                    <td class="checkbox-cell">
                        <label class="checkbox-label">
                            <input type="checkbox" name="{{ day }}_is_closed"
                                   {% if wh and wh.is_closed %}checked{% endif %}
                                   onclick="toggleTimeFields(this, '{{ day }}')">
                            <span>Выходной</span>
                        </label>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="form-actions">
            <button type="submit" class="submit-btn">Сохранить</button>
            <a href="{{ url_for('building.browse') }}" class="cancel-link">Отмена</a>
        </div>
    </form>

    <script>
        function toggleTimeFields(checkbox, day) {
            var openField = document.querySelector('input[name="' + day + '_open_time"]');
            var closeField = document.querySelector('input[name="' + day + '_close_time"]');
            if (checkbox.checked) {
                openField.disabled = true;
                closeField.disabled = true;
                openField.value = '';
                closeField.value = '';
            } else {
                openField.disabled = false;
                closeField.disabled = false;
            }
        }
    </script>
</body>
</html>
